# Payment-card anomaly detection — one-command stack.
#
#   docker compose up --build -d
#
# Brings up Kafka (KRaft), topic init, a custom PyFlink cluster + auto-submitted
# fraud job, MongoDB, the simulator/producer, the test consumer, the alert
# dashboard, and the Kafdrop / Mongo-Express web UIs.

services:
  # --- KAFKA IN KRAFT MODE (NO ZOOKEEPER) ---
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  # --- ONE-SHOT TOPIC CREATION ---
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment_transactions --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic transaction_alerts --partitions 3 --replication-factor 1
        echo "Topics ready:"
        kafka-topics --bootstrap-server kafka:29092 --list

  # --- KAFDROP WEB UI FOR KAFKA (http://localhost:9000) ---
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy

  # --- MONGODB ---
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10

  # --- MONGO-EXPRESS WEB UI (http://localhost:8082) ---
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27017/"
      ME_CONFIG_BASICAUTH_USERNAME: "admin"
      ME_CONFIG_BASICAUTH_PASSWORD: "admin"
    depends_on:
      mongodb:
        condition: service_healthy

  # --- APACHE FLINK JOBMANAGER (custom PyFlink image, http://localhost:8081) ---
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink_detector/Dockerfile
    image: anomaly-flink:1.18.1
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  # --- APACHE FLINK TASKMANAGER (WORKER) ---
  flink-taskmanager:
    image: anomaly-flink:1.18.1
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # --- ONE-SHOT PYFLINK JOB SUBMITTER ---
  flink-job-submitter:
    image: anomaly-flink:1.18.1
    container_name: flink-job-submitter
    depends_on:
      flink-jobmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for Flink JobManager REST API..."
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null; do sleep 3; done
        echo "JobManager is up. Submitting the fraud-detector job..."
        flink run -d -m flink-jobmanager:8081 \
          -pyexec python3 -pyclientexec python3 \
          -py /opt/project/flink_detector/job.py
        echo "Job submitted. Submitter exiting."

  # --- TRANSACTION SIMULATOR / KAFKA PRODUCER ---
  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    image: anomaly-simulator:latest
    container_name: simulator
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: on-failure

  # --- TEST CONSUMER (transaction stream visualization) ---
  test-consumer:
    build:
      context: .
      dockerfile: test_consumer/Dockerfile
    image: anomaly-test-consumer:latest
    container_name: test-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    tty: true
    restart: on-failure

  # --- STREAMLIT LIVE DASHBOARD (http://localhost:8501) ---
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: anomaly-streamlit-dashboard:latest
    container_name: dashboard
    ports:
      - "8501:8501"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MONGO_URI=mongodb://mongodb:27017/
    restart: on-failure

  # --- ALERT DASHBOARD (alert visualization + Mongo persistence) ---
  alert-dashboard:
    build:
      context: .
      dockerfile: alert_manager/Dockerfile
    image: anomaly-alert-dashboard:latest
    container_name: alert-dashboard
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MONGO_URI=mongodb://mongodb:27017/
    tty: true
    restart: on-failure

volumes:
  mongo_data:
